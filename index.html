<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#141927" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Open Raw Editor</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="viewport">
        <canvas id="preview" hidden></canvas>
        <div id="dropzone">
          <p class="dz-title">DROP RAW FILE</p>
          <p class="dz-hint">Sony .ARW &middot; Fujifilm .RAF &middot; DNG</p>
          <button id="pick-file" type="button">Browse&hellip;</button>
          <input
            id="file-input"
            type="file"
            hidden
            aria-label="Choose a RAW file"
          />
        </div>
      </section>
      <div id="divider" role="separator" aria-orientation="horizontal">
        <span class="grip"></span>
      </div>
      <aside id="sidebar">
        <div id="panel-scroll"></div>
        <div
          id="elevator"
          role="scrollbar"
          aria-controls="panel-scroll"
          aria-orientation="vertical"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
        >
          <div class="elevator-thumb"></div>
        </div>
      </aside>
    </main>
    <footer id="statusbar">
      <div
        id="status-bar-progress"
        role="progressbar"
        aria-hidden="true"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div id="status-bar-progress-fill"></div>
      </div>
      <span id="status-file">No file loaded</span>
      <span id="status-right">
        <span id="status-progress"></span>
        <span id="app-version">%APP_VERSION%</span>
      </span>
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
